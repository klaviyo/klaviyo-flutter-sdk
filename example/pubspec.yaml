name: klaviyo_flutter_sdk_example
description: Example app for Klaviyo Flutter SDK
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  klaviyo_flutter_sdk:
    path: ../

  logging: ^1.3.0
  permission_handler: ^11.3.1
  firebase_messaging: ^16.0.0
  firebase_core: ^4.0.0
  shared_preferences: ^2.2.2
  go_router: ^14.6.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
flutter:
  uses-material-design: true
