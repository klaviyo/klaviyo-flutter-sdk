name: klaviyo_flutter_sdk
description: A Flutter plugin that provides a wrapper around the native Klaviyo SDKs for iOS and Android.
version: 1.0.0

homepage: https://github.com/klaviyo/klaviyo-flutter-sdk

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^12.0.0+1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.klaviyo.klaviyo_flutter_sdk
        pluginClass: KlaviyoFlutterSdkPlugin
      ios:
        pluginClass: KlaviyoFlutterSdkPlugin 