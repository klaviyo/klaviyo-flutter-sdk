default_language_version:
  python: python3

repos:
  # Generic hygiene hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Language-specific formatters/linters
  - repo: local
    hooks:
      # ----- Dart / Flutter -----
      - id: dart-format-fix
        name: dart format (fix)
        entry: dart format
        language: system
        files: \.dart$
        stages: [pre-commit]

      - id: dart-format-check
        name: dart format (check)
        entry: dart format --set-exit-if-changed
        language: system
        files: \.dart$
        stages: [pre-push]

      # ----- Kotlin (Android) -----
      - id: ktlint-format
        name: ktlint format (Kotlin)
        entry: ktlint -F
        language: system
        files: \.kt$
        stages: [pre-commit]

      # ----- Swift (iOS) -----
      - id: swiftformat
        name: swiftformat
        entry: swiftformat
        language: system
        files: \.swift$
        stages: [pre-commit]

      - id: swiftlint
        name: swiftlint
        entry: swiftlint
        language: system
        files: \.swift$
        stages: [ pre-push ]
