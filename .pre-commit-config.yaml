default_language_version:
  python: python3

repos:
  # Generic hygiene hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: '\.swift$' # keep xcode indents

  # Language-specific formatters/linters
  - repo: local
    hooks:
      # ----- Dart / Flutter -----
      - id: dart-fix
        name: dart fix
        entry: dart fix --apply
        language: system
        files: \.dart$
        pass_filenames: false

      - id: dart-format
        name: dart format
        entry: dart format
        language: system
        files: \.dart$

      - id: flutter-analyze
        name: flutter analyze
        entry: bash -c 'timeout 60 flutter analyze --no-fatal-infos || (code=$?; if [ $code -eq 124 ]; then echo "Flutter analyze timed out after 60s - skipping (CI will catch issues)"; exit 0; else exit $code; fi)'
        language: system
        pass_filenames: false

      # ----- Kotlin (Android) -----
      - id: ktlint-format
        name: ktlint format (Kotlin)
        entry: ktlint -F
        language: system
        files: \.kt$

      # ----- Swift (iOS) -----
      - id: swiftformat
        name: swiftformat
        entry: swiftformat
        language: system
        files: \.swift$

      - id: swiftlint
        name: swiftlint
        entry: swiftlint
        language: system
        files: \.swift$
