default_language_version:
  python: python3

repos:
  # Generic hygiene hooks (auto-fix locally only, not in CI)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]

  # Language-specific formatters/linters
  - repo: local
    hooks:
      # ----- Dart / Flutter -----
      - id: dart-format-fix
        name: dart format (fix)
        entry: dart format
        language: system
        files: \.dart$
        stages: [pre-commit]

      - id: dart-format-check
        name: dart format (check)
        entry: dart format --set-exit-if-changed
        language: system
        files: \.dart$
        stages: [pre-push]

      - id: flutter-analyze
        name: flutter analyze
        entry: flutter analyze --no-fatal-infos
        language: system
        pass_filenames: false
        stages: [pre-push]

      # ----- Kotlin (Android) -----
      - id: ktlint-format
        name: ktlint format (Kotlin)
        entry: ktlint -F
        language: system
        files: \.kt$
        stages: [pre-commit]

      # ----- Swift (iOS) -----
      - id: swiftformat
        name: swiftformat
        entry: swiftformat
        language: system
        files: \.swift$
        stages: [pre-commit]

      - id: swiftlint
        name: swiftlint
        entry: swiftlint
        language: system
        files: \.swift$
        stages: [ pre-push ]
